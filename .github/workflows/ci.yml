name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: pip install ruff mypy
      - name: Lint
        run: ruff check src/ tests/ scripts/
      - name: Type check
        run: mypy src/nanochat --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=src/nanochat --cov-report=xml
      - name: Run integration tests
        run: pytest tests/integration/ -v -s
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        if: always()

  smoke-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Smoke test training
        run: python scripts/train.py --model-size nano --total-steps 10 --dtype float32
