<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nanochat-jax</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-hover: #79c0ff;
    --user-bg: #1f2937;
    --assistant-bg: #161b22;
    --input-bg: #0d1117;
    --send-bg: #238636;
    --send-hover: #2ea043;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
  header h1 span { color: var(--accent); }
  .header-info {
    font-size: 12px;
    color: var(--text-muted);
  }
  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    scroll-behavior: smooth;
  }
  .message {
    max-width: 720px;
    margin: 0 auto 16px auto;
    padding: 16px 20px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 15px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .message.user {
    background: var(--user-bg);
    border: 1px solid var(--border);
  }
  .message.assistant {
    background: var(--assistant-bg);
    border: 1px solid var(--border);
  }
  .message .role {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .message.user .role { color: var(--accent); }
  .message.assistant .role { color: #3fb950; }
  .message .content { color: var(--text); }
  .typing-indicator {
    display: inline-block;
    color: var(--text-muted);
  }
  .typing-indicator span {
    animation: blink 1.4s infinite both;
    font-size: 20px;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
  }
  #input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    flex-shrink: 0;
  }
  #input-form {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    gap: 12px;
  }
  #user-input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 48px;
    max-height: 200px;
  }
  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--text-muted); }
  #send-btn {
    background: var(--send-bg);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    align-self: flex-end;
  }
  #send-btn:hover { background: var(--send-hover); }
  #send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .welcome {
    max-width: 720px;
    margin: 80px auto;
    text-align: center;
  }
  .welcome h2 {
    font-size: 28px;
    margin-bottom: 12px;
    color: var(--text);
  }
  .welcome p {
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.6;
  }
  .controls {
    max-width: 720px;
    margin: 0 auto 8px auto;
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 13px;
    color: var(--text-muted);
  }
  .controls label { display: flex; align-items: center; gap: 4px; }
  .controls input[type="range"] { width: 80px; }
  .controls select, .controls input[type="number"] {
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 12px;
  }
  #clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    margin-left: auto;
  }
  #clear-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1><span>nanochat</span>-jax</h1>
  <div class="header-info" id="model-info">Loading...</div>
</header>

<div id="chat-container">
  <div class="welcome" id="welcome">
    <h2>nanochat-jax</h2>
    <p>A faithful JAX/Flax NNX port of the nanochat architecture.<br>
    Type a message below to start chatting with your model.</p>
  </div>
</div>

<div id="input-area">
  <div class="controls">
    <label>Temp: <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.8">
      <span id="temp-val">0.8</span></label>
    <label>Top-k: <input type="number" id="top-k" min="0" max="500" value="50" style="width:50px"></label>
    <label>Max tokens: <input type="number" id="max-tokens" min="1" max="4096" value="256" style="width:60px"></label>
    <button id="clear-btn" onclick="clearChat()">Clear</button>
  </div>
  <form id="input-form" onsubmit="sendMessage(event)">
    <textarea id="user-input" placeholder="Send a message..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage(event)}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,200)+'px'"></textarea>
    <button type="submit" id="send-btn">Send</button>
  </form>
</div>

<script>
const chatContainer = document.getElementById('chat-container');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const tempSlider = document.getElementById('temperature');
const tempVal = document.getElementById('temp-val');
const modelInfo = document.getElementById('model-info');

let messages = [];
let generating = false;

tempSlider.oninput = () => tempVal.textContent = tempSlider.value;

// Fetch model info on load
fetch('/health').then(r => r.json()).then(info => {
  modelInfo.textContent = `${info.device_type || 'unknown'} | ${info.compute_dtype || 'float32'}`;
}).catch(() => { modelInfo.textContent = 'connected'; });

function addMessage(role, content) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="role">${role}</div><div class="content"></div>`;
  div.querySelector('.content').textContent = content;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  return div;
}

function clearChat() {
  messages = [];
  chatContainer.innerHTML = `
    <div class="welcome" id="welcome">
      <h2>nanochat-jax</h2>
      <p>A faithful JAX/Flax NNX port of the nanochat architecture.<br>
      Type a message below to start chatting with your model.</p>
    </div>`;
}

async function sendMessage(e) {
  e.preventDefault();
  const text = userInput.value.trim();
  if (!text || generating) return;

  generating = true;
  sendBtn.disabled = true;
  userInput.value = '';
  userInput.style.height = 'auto';

  messages.push({ role: 'user', content: text });
  addMessage('user', text);

  // Add typing indicator
  const assistantDiv = addMessage('assistant', '');
  const contentEl = assistantDiv.querySelector('.content');
  contentEl.innerHTML = '<span class="typing-indicator"><span>.</span><span>.</span><span>.</span></span>';

  const temperature = parseFloat(tempSlider.value);
  const top_k = parseInt(document.getElementById('top-k').value);
  const max_tokens = parseInt(document.getElementById('max-tokens').value);

  try {
    const resp = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: messages,
        temperature, top_k, max_tokens,
        stream: true
      })
    });

    contentEl.textContent = '';
    let fullResponse = '';

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;

        try {
          const chunk = JSON.parse(data);
          const delta = chunk.choices?.[0]?.delta;
          if (delta?.content) {
            fullResponse += delta.content;
            contentEl.textContent = fullResponse;
            chatContainer.scrollTop = chatContainer.scrollHeight;
          }
        } catch {}
      }
    }

    messages.push({ role: 'assistant', content: fullResponse });

  } catch (err) {
    contentEl.textContent = `Error: ${err.message}`;
  }

  generating = false;
  sendBtn.disabled = false;
  userInput.focus();
}

userInput.focus();
</script>
</body>
</html>
